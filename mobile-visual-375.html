<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mobile visual 375</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: start center;
      background: #202124;
      color: #f8f9fa;
      font: 13px system-ui, -apple-system, Segoe UI, sans-serif;
      padding: 20px;
    }

    .phone {
      background: #111;
      border: 1px solid #555;
      border-radius: 24px;
      padding: 12px 8px 8px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.35);
    }

    .bar {
      text-align: center;
      color: #ddd;
      padding-bottom: 8px;
      font-weight: 600;
    }

    iframe {
      width: 375px;
      height: 812px;
      border: 0;
      background: white;
      display: block;
    }
  </style>
</head>
<body>
  <section class="phone">
    <div class="bar">375 x 812</div>
    <iframe src="/index.html"></iframe>
  </section>
</body>
</html>
